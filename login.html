
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل دخول المختبر - LabFlow</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    
    <style>
        body { font-family: Tahoma, sans-serif; background: radial-gradient(circle at 15% 0%, #153c66 0, #07101d 40%, #03070e 100%); color: #eef6ff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: rgba(16, 29, 48, 0.88); border: 1px solid #263b5d; padding: 40px; border-radius: 18px; width: 100%; max-width: 380px; text-align: center; box-shadow: 0 18px 60px rgba(0,0,0,0.5); }
        .login-box h2 { color: #19d184; margin-bottom: 25px; border-bottom: 1px solid #263b5d; padding-bottom: 15px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #263b5d; border-radius: 8px; background: #0b1728; color: #fff; box-sizing: border-box; outline: none; }
        input:focus { border-color: #19d184; }
        button { width: 100%; padding: 12px; margin-top: 15px; background: #19d184; color: #03070e; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 16px; }
        button:hover { background: #12a668; }
        #errorMsg { color: #ff6578; margin-top: 15px; font-size: 14px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>تفعيل نظام LabFlow</h2>
        <input type="email" id="email" placeholder="البريد الإلكتروني للمختبر">
        <input type="password" id="password" placeholder="كلمة المرور">
        <button onclick="loginUser()" id="loginBtn">تسجيل الدخول وربط الجهاز</button>
        <div id="errorMsg"></div>
    </div>

    <script>
        // إعدادات الربط مع سيرفر آسيا الخاص بك
        const firebaseConfig = {
            apiKey: "AIzaSyB5MTJRDNILD3KalDIMmdOQxGFPsBgwOC8",
            authDomain: "labflow-a8cdc.firebaseapp.com",
            databaseURL: "https://labflow-a8cdc-default-rtdb.asia-southeast1.firebasedatabase.app/",
            projectId: "labflow-a8cdc"
        };
        
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        // توليد معرّف (بصمة) فريد للجهاز
        function getDeviceID() {
            let did = localStorage.getItem('device_id');
            if (!did) {
                did = 'dev_' + Math.random().toString(36).substr(2, 9);
                localStorage.setItem('device_id', did);
            }
            return did;
        }

        function loginUser() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            const btn = document.getElementById('loginBtn');
            const errorMsg = document.getElementById('errorMsg');
            
            if (!email || !password) {
                errorMsg.innerText = "يرجى إدخال البريد الإلكتروني وكلمة المرور.";
                return;
            }

            btn.innerText = "جاري التحقق من التراخيص...";
            errorMsg.innerText = "";

            auth.signInWithEmailAndPassword(email, password)
            .then((userCredential) => {
                const uid = userCredential.user.uid;
                const currentDeviceId = getDeviceID();

                // فحص البيانات والقيود من قاعدة البيانات
                db.ref('users/' + uid).once('value').then((snapshot) => {
                    const userData = snapshot.val();
                    
                    if (!userData || userData.status === 'suspended') {
                        errorMsg.innerText = "هذا الاشتراك موقوف أو غير مسجل في المنظومة.";
                        auth.signOut();
                        btn.innerText = "تسجيل الدخول وربط الجهاز";
                        return;
                    }

                    let activeDevices = userData.activeDevices || {};
                    
                    // إذا الجهاز مسجل مسبقاً يعبر مباشرة
                    if (activeDevices[currentDeviceId]) {
                        localStorage.setItem('lab_user_uid', uid);
                        window.location.href = './index.html';
                        return;
                    }

                    // إذا جهاز جديد، نفحص الحد الأقصى للأجهزة
                    const maxDevices = Number(userData.maxDevices || 1);
                    if (Object.keys(activeDevices).length >= maxDevices) {
                        errorMsg.innerText = `عذراً، تم تجاوز الحد الأقصى للأجهزة المسموحة (${maxDevices}).`;
                        auth.signOut();
                        btn.innerText = "تسجيل الدخول وربط الجهاز";
                    } else {
                        // تسجيل الجهاز بالفايربيس وتوجيه المستخدم للبرنامج
                        db.ref('users/' + uid + '/activeDevices/' + currentDeviceId).set(true).then(() => {
                            localStorage.setItem('lab_user_uid', uid);
                            window.location.href = './index.html';
                        });
                    }
                });
            })
            .catch((error) => {
                btn.innerText = "تسجيل الدخول وربط الجهاز";
                errorMsg.innerText = "البريد الإلكتروني أو كلمة المرور غير صحيحة.";
            });
        }
    </script>
</body>
</html>
